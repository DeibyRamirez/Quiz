# =============================================================================
# Electro Quiz — solo contenedor de aplicación (producción / staging)
# =============================================================================
#
# MongoDB externo obligatorio (Atlas, Render Mongo, self-hosted, etc.)
#
# Uso:
#   cp .env.docker.example .env.docker
#   # Editar MONGODB_URI con tu cluster Atlas
#   docker compose -f docker-compose.prod.yml up --build -d
#
# =============================================================================

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:?Define NEXT_PUBLIC_APP_URL}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    container_name: electro-quiz-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    env_file:
      - path: .env.docker
        required: true
    environment:
      HOSTNAME: 0.0.0.0
      PORT: 3000
      # MONGODB_URI y JWT_SECRET deben venir de .env.docker o del orchestrator
